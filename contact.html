<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Contacto</title>
    <meta name="description" content="Formulario de contacto.">
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body>
    <header class="site-header container">
      <a class="brand" href="/">TuNombre</a>
      <nav class="site-nav" aria-label="Navegación principal">
        <ul>
          <li><a href="/">Inicio</a></li>
          <li><a href="/about.html">Sobre mí</a></li>
          <li><a href="/projects.html">Proyectos</a></li>
          <li><a href="/contact.html">Contacto</a></li>
        </ul>
      </nav>
    </header>
    <main class="container">
      <h1>Contacto</h1>
      <p>Puedes usar el siguiente formulario. En GitHub Pages necesitarás un servicio externo (Formspree, Netlify Forms, etc.) para recibir mensajes.</p>
      <form action="https://formspree.io/f/your-form-id" method="POST">
        <label for="name">Nombre</label>
        <input id="name" name="name" required>

        <label for="email">Correo</label>
        <input id="email" name="email" type="email" required>

        <label for="message">Mensaje</label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <button type="submit" class="btn">Enviar</button>
      </form>
    </main>
    <footer class="site-footer container">
      <p>&copy; <span id="year"></span> TuNombre.</p>
    </footer>
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  </body>
</html>
